# =============================================================
# deploy/nginx/host-auditwise.conf
# Host-level Nginx configuration for AuditWise on Hostinger VPS.
#
# Architecture:
#   Host Nginx (ports 80/443) ──► backend container (127.0.0.1:5000)
#   Backend serves both REST API and the pre-built React SPA.
#
# Installation:
#   sudo cp deploy/nginx/host-auditwise.conf \
#            /etc/nginx/sites-available/auditwise.conf
#   sudo ln -sf /etc/nginx/sites-available/auditwise.conf \
#               /etc/nginx/sites-enabled/auditwise.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after DNS propagation):
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com \
#                --email admin@yourdomain.com --agree-tos --non-interactive
#
# Replace "auditwise.tech" with your actual domain before use.
# =============================================================

# ── Rate-limit zones ─────────────────────────────────────────────
# 30 req/s per IP for general API traffic (burst of 20 allows short spikes).
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
# 5 req/min per IP for login endpoint to slow brute-force attempts.
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Super-admin IP allowlist ─────────────────────────────────────
# Set default to 0 (deny) and add trusted IPs/CIDRs to allow access
# to /api/platform/* endpoints.
# Example: 203.0.113.50/32 1;
geo $super_admin_allowed {
    default         0;
    127.0.0.1/32    1;
    ::1/128         1;
    # Add your office / home IP here:
    # 203.0.113.0/24 1;
}

# ── Upstream ─────────────────────────────────────────────────────
upstream auditwise_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name auditwise.tech www.auditwise.tech;

    # Let certbot complete ACME challenges over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (production) ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auditwise.tech www.auditwise.tech;

    # ── TLS ──────────────────────────────────────────────────────
    # Certbot will populate these paths after: certbot --nginx -d …
    ssl_certificate     /etc/letsencrypt/live/auditwise.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auditwise.tech/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # ── Body / timeout limits ─────────────────────────────────────
    client_max_body_size   50M;
    client_body_timeout    60s;
    client_header_timeout  60s;

    # ── Compression ───────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml font/woff2;

    # ── Security headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Health / liveness probes (no logging) ────────────────────
    location = /__healthz {
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    location = /health {
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # ── Super-admin platform API (IP-restricted) ─────────────────
    location /api/platform {
        if ($super_admin_allowed = 0) {
            return 403 '{"error":"Access denied. Platform administration is restricted to authorized networks.","code":"NGINX_IP_DENIED"}';
        }
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── SSE streaming — disable all buffering ────────────────────
    # /api/platform/system-health/events sends a continuous event stream.
    # Nginx must NOT buffer it or the client will never receive events.
    location = /api/platform/system-health/events {
        # IP restriction still applies for SSE endpoint.
        if ($super_admin_allowed = 0) {
            return 403 '{"error":"Access denied.","code":"NGINX_IP_DENIED"}';
        }
        proxy_pass            http://auditwise_backend;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        # Keep the connection open (SSE uses a persistent HTTP response).
        proxy_set_header      Connection        "";
        # Disable all proxy buffering so events flow through immediately.
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        # Tell any intermediate proxy/CDN not to buffer either.
        add_header            X-Accel-Buffering "no" always;
    }

    # ── Login endpoint (rate-limited) ────────────────────────────
    location = /api/auth/login {
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # 5 req/min, allow a burst of 3 without queuing.
        limit_req          zone=auth burst=3 nodelay;
        limit_req_status   429;
    }

    # ── API routes ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
        proxy_buffering        on;
        proxy_buffer_size      8k;
        proxy_buffers          8 8k;
        # Prevent stale API responses from being cached by browsers/CDNs.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        limit_req          zone=api burst=20 nodelay;
        limit_req_status   429;
    }

    # ── Vite-generated static assets (content-hashed) ────────────
    # Files under /assets/ have a hash in their name (e.g. index-Bx3kT9.js),
    # so they are truly immutable and can be cached for a full year.
    location /assets/ {
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary      "Accept-Encoding" always;
        access_log off;
    }

    # ── User-uploaded files ───────────────────────────────────────
    # Served by the backend from /uploads/. Cache for 1 day.
    location /uploads/ {
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        add_header Cache-Control "public, max-age=86400" always;
        add_header Vary      "Accept-Encoding" always;
        access_log off;
    }

    # ── Static file types (fonts, icons, images) ─────────────────
    # Any hashed JS/CSS/font/image not already matched by /assets/
    # is also safe to cache aggressively.
    location ~* \.(js|css|woff2|woff|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        proxy_pass         http://auditwise_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary      "Accept-Encoding" always;
        access_log off;
    }

    # ── SPA catch-all (React Router) ─────────────────────────────
    # WebSocket upgrade headers are included so the app can open ws:// or
    # wss:// connections through the same reverse proxy.
    location / {
        proxy_pass            http://auditwise_backend;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
    }
}
