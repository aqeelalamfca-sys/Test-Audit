name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy-main
  cancel-in-progress: false

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

      - name: Validate build output
        run: |
          test -f dist/index.cjs
          test -f dist/public/index.html

  deploy:
    name: Deploy To Hostinger VPS
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 25
    env:
      APP_DIR: /opt/auditwise
      VPS_PORT: "22"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_PORT"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload deploy script
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          test -n "$APP_DIR"
          test -n "$VPS_USER"
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" deploy/vps-github-pull-deploy.sh "$VPS_USER@$VPS_HOST:$APP_DIR/deploy/vps-github-pull-deploy.sh"

      - name: Run remote deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "chmod +x '$APP_DIR/deploy/vps-github-pull-deploy.sh' && \
             APP_DIR='$APP_DIR' BRANCH='main' COMPOSE_FILE='docker-compose.vps.yml' \
             '$APP_DIR/deploy/vps-github-pull-deploy.sh'"

      - name: Post-deploy health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "curl -fsS http://127.0.0.1:5000/api/health >/dev/null && docker compose -f '$APP_DIR/docker-compose.vps.yml' ps"
