name: Deploy AuditWise to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_DIR: /opt/auditwise
  DOMAIN: auditwise.tech

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Verify build output
        run: |
          test -f dist/index.cjs || { echo "FAIL: dist/index.cjs missing"; exit 1; }
          test -f dist/public/index.html || { echo "FAIL: dist/public/index.html missing"; exit 1; }
          echo "Build verified: $(du -sh dist/ | cut -f1)"

  deploy:
    name: Deploy to VPS
    needs: build-verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GITHUB_REPO: ${{ github.repository }}
          DEPLOY_DOMAIN: auditwise.tech
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" bash -s -- "$GITHUB_REPO" "$DEPLOY_DOMAIN" << 'DEPLOY_SCRIPT'
            set -e

            GITHUB_REPO="$1"
            DOMAIN="$2"
            APP_DIR=/opt/auditwise
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)

            echo "════════════════════════════════════════════════"
            echo "  AuditWise — Production Deploy (5-container)"
            echo "  $(date -Is)"
            echo "════════════════════════════════════════════════"

            # ── First-time setup ──
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "[INIT] First-time deployment — running full setup..."
              git clone -b main "https://github.com/${GITHUB_REPO}.git" "$APP_DIR" || exit 1
              cd "$APP_DIR"

              if [ -f deploy/hostinger-deploy.sh ]; then
                chmod +x deploy/hostinger-deploy.sh
                sudo bash deploy/hostinger-deploy.sh
              else
                echo "FATAL: deploy/hostinger-deploy.sh not found"
                exit 1
              fi
              exit 0
            fi

            cd "$APP_DIR"

            # ── [1/8] Backup database ──
            echo "[1/8] Pre-deploy database backup..."
            mkdir -p backups
            if docker exec auditwise-db pg_isready -U auditwise -d auditwise -h localhost &>/dev/null; then
              docker exec auditwise-db pg_dump -U auditwise -d auditwise --no-owner --no-privileges 2>/dev/null \
                | gzip > "backups/pre-deploy_${TIMESTAMP}.sql.gz" && \
                echo "  Backup saved: backups/pre-deploy_${TIMESTAMP}.sql.gz" || \
                echo "  Backup skipped (dump failed)"
            else
              echo "  Database not running — skipping backup"
            fi

            # ── [2/8] Save rollback point ──
            echo "[2/8] Recording rollback point..."
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "  Previous: ${PREV_COMMIT}"

            # ── [3/8] Pull latest code ──
            echo "[3/8] Pulling latest code..."
            git fetch --all --prune -q
            git reset --hard origin/main -q
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "  Updated: $(git log --oneline -1)"

            if [ "$PREV_COMMIT" = "$NEW_COMMIT" ]; then
              echo "  No code changes — rebuilding containers anyway"
            fi

            # ── [4/8] Copy SSL certs into Docker volume ──
            echo "[4/8] Syncing SSL certificates..."
            CERT_VOLUME=$(docker volume inspect auditwise_certbot-etc --format '{{.Mountpoint}}' 2>/dev/null || echo "")
            if [ -z "$CERT_VOLUME" ]; then
              docker volume create auditwise_certbot-etc >/dev/null 2>&1 || true
              CERT_VOLUME=$(docker volume inspect auditwise_certbot-etc --format '{{.Mountpoint}}' 2>/dev/null || echo "/var/lib/docker/volumes/auditwise_certbot-etc/_data")
            fi
            if [ -f "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem" ]; then
              sudo cp "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem" "${CERT_VOLUME}/fullchain.pem"
              sudo cp "/etc/letsencrypt/live/${DOMAIN}/privkey.pem" "${CERT_VOLUME}/privkey.pem"
              sudo chmod 644 "${CERT_VOLUME}/fullchain.pem"
              sudo chmod 600 "${CERT_VOLUME}/privkey.pem"
              echo "  SSL certs copied to Docker volume"
            else
              echo "  No SSL certs found — nginx will serve HTTP only"
            fi

            # ── [5/8] Rebuild and restart all containers ──
            echo "[5/8] Rebuilding containers..."
            docker compose build --no-cache backend frontend nginx
            docker compose up -d --force-recreate --remove-orphans
            echo "  All 5 containers restarting"

            # ── [6/8] Wait for health ──
            echo "[6/8] Waiting for app to become healthy (max 4 min)..."
            HEALTHY=false
            for i in $(seq 1 240); do
              HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:5000/api/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  Backend healthy after ${i}s (HTTP $HTTP_CODE)"
                HEALTHY=true
                break
              fi
              if [ "$((i % 30))" -eq 0 ]; then
                echo "  Still waiting... (${i}s, last HTTP: $HTTP_CODE)"
              fi
              sleep 1
            done

            if [ "$HEALTHY" = "false" ]; then
              echo ""
              echo "  DEPLOY FAILED — App not healthy after 240s"
              echo "  Container logs (last 30 lines):"
              docker compose logs --tail 30 backend 2>/dev/null || true
              echo ""
              echo "  ROLLING BACK to ${PREV_COMMIT}..."
              docker compose stop backend frontend nginx || true
              git reset --hard "$PREV_COMMIT" -q
              docker compose build --no-cache backend frontend nginx
              docker compose up -d --force-recreate
              echo "  Rolled back. Waiting for recovery..."
              RECOVERED=false
              for i in $(seq 1 120); do
                if curl -sf http://127.0.0.1:5000/api/health &>/dev/null; then
                  echo "  Recovery successful after ${i}s"
                  RECOVERED=true
                  break
                fi
                sleep 1
              done
              if [ "$RECOVERED" = "false" ]; then
                echo "  CRITICAL: Rollback recovery also failed after 120s"
                docker compose logs --tail 20 backend 2>/dev/null || true
              fi
              exit 1
            fi

            # Check nginx container health
            echo "  Checking nginx proxy..."
            NGINX_OK=false
            for i in $(seq 1 30); do
              NGINX_CODE=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1/health 2>/dev/null || echo "000")
              if [ "$NGINX_CODE" = "200" ]; then
                echo "  Nginx proxy healthy (HTTP $NGINX_CODE)"
                NGINX_OK=true
                break
              fi
              sleep 1
            done
            if [ "$NGINX_OK" = "false" ]; then
              echo "  WARNING: Nginx proxy not responding on port 80 — check container logs"
              docker compose logs --tail 10 nginx 2>/dev/null || true
            fi

            # ── [7/8] Disable host-level Nginx (replaced by container) ──
            echo "[7/8] Managing host Nginx..."
            if systemctl is-active nginx &>/dev/null; then
              echo "  Stopping host-level Nginx (replaced by container)..."
              sudo systemctl stop nginx 2>/dev/null || true
              sudo systemctl disable nginx 2>/dev/null || true
              echo "  Host Nginx disabled — container handles ports 80/443"
            else
              echo "  Host Nginx already stopped"
            fi

            # ── [8/8] Cleanup ──
            echo "[8/8] Cleanup..."
            docker image prune -f >/dev/null 2>&1 || true
            find backups -name "*.sql.gz" -mtime +30 -delete 2>/dev/null || true
            echo "  Old images and backups cleaned"

            echo ""
            echo "════════════════════════════════════════════════"
            echo "  DEPLOY COMPLETE (5-container stack)"
            echo "  Commit: $(git log --oneline -1)"
            echo "  URL:    https://${DOMAIN}"
            echo ""
            docker compose ps --format "table {{.Name}}\t{{.Status}}" 2>/dev/null || docker compose ps
            echo "════════════════════════════════════════════════"
          DEPLOY_SCRIPT

      - name: Post-deploy health check
        if: success()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" << 'HEALTH_CHECK'
            echo "=== Container Status ==="
            docker compose -f /opt/auditwise/docker-compose.yml ps --format "table {{.Name}}\t{{.Status}}"
            echo ""
            echo "=== Backend Health ==="
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:5000/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Backend health check: PASSED (HTTP $HTTP_CODE)"
            else
              echo "Backend health check: FAILED (HTTP $HTTP_CODE)"
              exit 1
            fi
            echo ""
            echo "=== Nginx Proxy Health ==="
            NGINX_CODE=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1/health 2>/dev/null || echo "000")
            if [ "$NGINX_CODE" = "200" ]; then
              echo "Nginx proxy health check: PASSED (HTTP $NGINX_CODE)"
            else
              echo "Nginx proxy health check: WARNING (HTTP $NGINX_CODE)"
            fi
          HEALTH_CHECK
