# =============================================================
# AuditWise — CI/CD Deploy Pipeline
# Workflow: Replit → GitHub → Hostinger VPS
# Trigger: Push to main branch
# =============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/aqeelalamfca-sys/auditwise-backend
  FRONTEND_IMAGE: ghcr.io/aqeelalamfca-sys/auditwise-frontend
  NODE_VERSION: "20"

jobs:
  # ── Step 1: Lint and type check ───────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit --project server/tsconfig.json
        continue-on-error: true

  # ── Step 2: Build and verify ──────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Verify build output
        run: |
          echo "Checking backend build..."
          test -f dist/index.cjs && echo "  Backend build: OK" || exit 1
          echo "Checking frontend build..."
          test -f dist/public/index.html && echo "  Frontend build: OK" || exit 1
          echo "Build verification passed."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ── Step 3: Build and push Docker images ──────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Step 4: Deploy to Hostinger VPS ───────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 300s
          script: |
            set -e
            echo "=== AuditWise Deployment ==="
            echo "Started at: $(date)"

            cd /opt/auditwise

            echo "[1/6] Pulling latest repository code..."
            git pull origin main

            echo "[2/6] Pulling latest Docker images..."
            docker compose pull backend frontend

            echo "[3/6] Rebuilding Docker containers..."
            docker compose up -d --build --force-recreate backend frontend

            echo "[4/6] Waiting for backend health check..."
            TIMEOUT=120
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              if docker compose exec -T backend curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "  Backend healthy after ${ELAPSED}s"
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "FATAL: Backend health check failed after ${TIMEOUT}s"
              docker compose logs --tail=50 backend
              exit 1
            fi

            echo "[5/6] Restarting Nginx..."
            docker compose up -d --force-recreate nginx

            echo "[6/6] Cleaning up unused Docker images..."
            docker image prune -f

            echo ""
            echo "=== Deployment Complete ==="
            echo "Finished at: $(date)"
            echo "Backend:  http://localhost:5000/api/health"
            echo "Frontend: http://localhost:3000"
            echo "Domain:   https://auditwise.tech"
