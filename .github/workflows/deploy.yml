name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deployment mode"
        required: true
        default: "docker"
        type: choice
        options:
          - docker
          - native

env:
  APP_DIR: /opt/auditwise
  DOMAIN: auditwise.tech

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Verify build output
        run: |
          test -f dist/index.cjs && echo "Backend build OK" || exit 1
          test -f dist/public/index.html && echo "Frontend build OK" || exit 1
          echo "Build size: $(du -sh dist/ | cut -f1)"

  deploy-docker:
    name: Deploy (Docker)
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_mode != 'native' }}
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            APP_DIR=/opt/auditwise

            echo "=== AuditWise Docker Deploy ==="
            echo "$(date -Is)"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "[1] First-time setup — running full deploy..."
              git clone -b main https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
              bash deploy/hostinger-deploy.sh
              exit 0
            fi

            cd "$APP_DIR"

            echo "[1] Pre-deploy backup..."
            mkdir -p backups
            docker exec auditwise-db pg_dump -U auditwise -d auditwise --no-owner --no-privileges 2>/dev/null \
              | gzip > "backups/pre-deploy_$(date +%Y%m%d_%H%M%S).sql.gz" || echo "Backup skipped"

            PREV_COMMIT=$(git rev-parse HEAD)

            echo "[2] Pulling latest code..."
            git fetch --all -q
            git reset --hard origin/main -q
            echo "Commit: $(git log --oneline -1)"

            echo "[3] Rebuilding containers (db, redis, backend only — host Nginx handles routing)..."
            docker compose build --no-cache backend
            docker compose up -d --force-recreate db redis backend

            echo "[4] Waiting for app to become healthy (max 4 min)..."
            for i in $(seq 1 240); do
              if curl -sf http://127.0.0.1:5000/health >/dev/null 2>&1; then
                echo "App healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 240 ]; then
                echo "FAILED: App not healthy. Rolling back..."
                docker compose stop backend || true
                git reset --hard "$PREV_COMMIT" -q
                docker compose build --no-cache backend
                docker compose up -d db redis backend
                echo "Rolled back to $PREV_COMMIT"
                exit 1
              fi
              sleep 1
            done

            echo "[5] Updating Nginx..."
            if [ -f "/etc/letsencrypt/live/auditwise.tech/fullchain.pem" ]; then
              cp deploy/nginx/auditwise-ssl.conf /etc/nginx/sites-available/auditwise
            else
              cp deploy/nginx/auditwise.conf /etc/nginx/sites-available/auditwise
            fi
            ln -sf /etc/nginx/sites-available/auditwise /etc/nginx/sites-enabled/auditwise
            nginx -t && systemctl reload nginx

            echo "[6] Cleanup..."
            docker image prune -f >/dev/null 2>&1 || true
            find backups -name "*.sql.gz" -mtime +30 -delete 2>/dev/null || true

            echo ""
            echo "=== DEPLOY COMPLETE ==="
            echo "URL: https://auditwise.tech"
            docker compose ps --format "table {{.Name}}\t{{.Status}}"

  deploy-native:
    name: Deploy (PM2 Native)
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_mode == 'native' }}
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            APP_DIR=/opt/auditwise

            echo "=== AuditWise Native Deploy ==="

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "First-time setup — running full native deploy..."
              git clone -b main https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
              bash deploy/vps-native-deploy.sh
              exit 0
            fi

            cd "$APP_DIR"
            bash deploy/vps-native-update.sh
