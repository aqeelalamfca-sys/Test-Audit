<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>AuditWise Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 32px;
      text-align: center;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background: #f7f9fc;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .status-indicator {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .info {
      color: #666;
      font-size: 14px;
      line-height: 1.8;
    }
    .info strong {
      color: #333;
    }
    .links {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #e5e7eb;
    }
    .link-btn {
      display: block;
      background: #667eea;
      color: white;
      text-decoration: none;
      padding: 15px 25px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 10px;
      transition: all 0.3s;
    }
    .link-btn:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .refresh-note {
      text-align: center;
      color: #999;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 AuditWise Status</h1>
    
    <div class="status">
      <div>
        <strong>Application Status</strong><br>
        <span style="color: #10b981; font-weight: 600;">● Online</span>
      </div>
      <div class="status-indicator"></div>
    </div>

    <div class="info">
      <p><strong>Server:</strong> auditwise.thinkoptimise.com</p>
      <p><strong>Last Updated:</strong> <span id="timestamp"></span></p>
      <p><strong>Auto-refresh:</strong> Every 30 seconds</p>
    </div>

    <div class="links">
      <a href="/api/logs/deployment" class="link-btn">
        📋 View Deployment Logs
      </a>
      <a href="/api/logs/raw" class="link-btn">
        🔍 View Raw Logs (JSON)
      </a>
      <a href="/health" class="link-btn">
        ❤️ Health Check
      </a>
      <a href="/" class="link-btn" style="background: #10b981;">
        🏠 Go to Application
      </a>
    </div>

    <p class="refresh-note">Page refreshes automatically every 30 seconds</p>
  </div>

  <script>
    document.getElementById('timestamp').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
