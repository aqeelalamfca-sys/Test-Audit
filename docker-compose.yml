services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auditwise-app
    restart: unless-stopped
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_USER=${POSTGRES_USER:-auditwise}
      - POSTGRES_DB=${POSTGRES_DB:-auditwise}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 3g
    mem_reservation: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  db:
    image: postgres:16-alpine
    container_name: auditwise-db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditwise}
      POSTGRES_USER: ${POSTGRES_USER:-auditwise}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 1g
    mem_reservation: 256m
    shm_size: 256m
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "idle_in_transaction_session_timeout=60000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditwise} -d ${POSTGRES_DB:-auditwise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
