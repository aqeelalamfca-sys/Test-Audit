services:
  db:
    image: postgres:16-alpine
    container_name: auditwise-db
    restart: unless-stopped
    expose:
      - "5432"
    ports:
      - "${DB_BIND:-127.0.0.1}:${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditwise}
      POSTGRES_USER: ${POSTGRES_USER:-auditwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Aqeel@123$}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 256m
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "idle_in_transaction_session_timeout=60000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditwise} -d ${POSTGRES_DB:-auditwise} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - auditwise
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ghcr.io/aqeelalamfca-sys/auditwise-backend:${APP_VERSION:-latest}
    container_name: auditwise-backend
    restart: unless-stopped
    expose:
      - "5000"
    ports:
      - "${APP_BIND:-127.0.0.1}:${BACKEND_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "5000"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-auditwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Aqeel@123$}
      POSTGRES_DB: ${POSTGRES_DB:-auditwise}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-Aqeel@123$}
      DATABASE_URL: ${DATABASE_URL:-postgresql://auditwise:Aqeel%40123%24@db:5432/auditwise?schema=public}
      JWT_SECRET: ${JWT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-}
      INITIAL_SUPER_ADMIN_EMAIL: ${INITIAL_SUPER_ADMIN_EMAIL:-aqeelalam2010@gmail.com}
      INITIAL_SUPER_ADMIN_PASSWORD: ${INITIAL_SUPER_ADMIN_PASSWORD:-Aqeel@123$}
      SUPER_ADMIN_ALLOWED_IPS: ${SUPER_ADMIN_ALLOWED_IPS:-}
      ADMIN_RESET: ${ADMIN_RESET:-false}
      NODE_HEAP_SIZE: ${NODE_HEAP_SIZE:-2560}
      APP_VERSION: ${APP_VERSION:-latest}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5
    networks:
      - auditwise
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: ghcr.io/aqeelalamfca-sys/auditwise-frontend:${APP_VERSION:-latest}
    container_name: auditwise-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - auditwise
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: auditwise-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - auditwise
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  auditwise:
    driver: bridge

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
  certbot-webroot:
    driver: local
